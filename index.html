document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ont-weight: 400; font-style: italic; font-display: swap;\n}\n@font-face {\n  font-family: \"Embark Sans Headline\";\n  src: url('fonts/EmbarkSansHeadline-MediumItalic.otf') format('opentype');\n  font-weight: 500; font-style: italic; font-display: swap;\n}\n@font-face {\n  font-family: \"Embark Sans Headline\";\n  src: url('fonts/EmbarkSansHeadline-BoldItalic.otf') format('opentype');\n  font-weight: 700; font-style: italic; font-display: swap;\n}\n\n:root {\n  /* ---------- BRAND PALETTE (theme: \"Embark\") ---------- */\n  --embark-blue:        #237EF1;   /* accent2 — PRIMARY accent, dominant */\n  --embark-yellow:      #FCDC00;   /* accent5 — single-deck alt accent   */\n  --embark-light-blue:  #5AC1E7;   /* lt2  — supporting / charts         */\n  --embark-slate:       #44546A;   /* dk2  — secondary text, captions    */\n  --embark-black:       #000000;   /* dk1  — primary text                */\n  --embark-white:       #FFFFFF;   /* lt1  — primary background          */\n\n  /* Extended chart / data accents (use sparingly, never on brand covers) */\n  --embark-pink:        #F277C5;   /* accent1 */\n  --embark-red:         #F84139;   /* accent3 */\n  --embark-green:       #2DB64F;   /* accent4 */\n  --embark-orange:      #F98200;   /* accent6 */\n  --embark-link:        #0563C1;   /* hyperlink */\n\n  /* Tints of primary blue (derived, for fills / hovers / rows) */\n  --blue-700:  #1A5FB8;   /* pressed / dark hover */\n  --blue-600:  #237EF1;   /* base */\n  --blue-100:  #D3E5FD;   /* light fill / table zebra */\n  --blue-050:  #EAF3FE;   /* faint fill */\n\n  /* Neutral cream used on some cover variants */\n  --embark-cream:       #EDE8E2;\n\n  /* ---------- SEMANTIC COLOR ROLES ---------- */\n  --fg-primary:    var(--embark-black);\n  --fg-secondary:  var(--embark-slate);\n  --fg-on-color:   var(--embark-white);   /* text on blue/yellow fills */\n  --fg-accent:     var(--embark-blue);\n  --bg-page:       var(--embark-white);\n  --bg-cover:      var(--embark-blue);     /* full-bleed cover / divider */\n  --bg-cover-alt:  var(--embark-yellow);   /* alternate cover */\n  --border-hair:   #D7DCE3;                /* hairline rules / table borders */\n\n  /* ---------- TYPE FAMILIES ---------- */\n  --font-headline: \"Embark Sans Headline\", \"Inter\", system-ui, sans-serif;\n  --font-body:     \"Embark Sans\", \"Inter\", system-ui, sans-serif;\n\n  /* ---------- TYPE SCALE (pt → for slides @ 13.33\"×7.5\") ----------\n     Slides are authored in points. 1pt ≈ 1.333px at 96dpi.        */\n  --t-cover:     52pt;   /* cover / closing title           */\n  --t-title:     32pt;   /* slide title (range 28–36)        */\n  --t-subtitle:  24pt;   /* blue subtitle under title        */\n  --t-section:   18pt;   /* section header, bold, blue/white */\n  --t-body:      13pt;   /* body copy (range 11–14)          */\n  --t-body-sm:   11pt;   /* dense body / table cells         */\n  --t-caption:   10pt;   /* captions                          */\n  --t-footnote:  9pt;    /* footnotes / footer wordmark      */\n\n  /* ---------- WEIGHTS ---------- */\n  --w-regular: 400;\n  --w-medium:  500;\n  --w-semibold:600;\n  --w-bold:    700;\n\n  /* ---------- LINE HEIGHTS ---------- */\n  --lh-tight:  1.05;\n  --lh-snug:   1.2;\n  --lh-body:   1.45;\n\n  /* ---------- LAYOUT ---------- */\n  --slide-margin: 0.5in;   /* min 0.4in, master uses ~0.5in */\n  --radius-sm: 4px;\n  --radius-md: 8px;\n}\n\n/* ============================================================\n   SEMANTIC TYPE CLASSES\n   Sentence case everywhere. Headlines use the headline family.\n   ============================================================ */\n.embark-cover-title {\n  font-family: var(--font-headline);\n  font-size: var(--t-cover);\n  font-weight: var(--w-medium);\n  line-height: var(--lh-tight);\n  letter-spacing: -0.01em;\n  color: var(--fg-on-color);\n}\n.embark-title {\n  font-family: var(--font-headline);\n  font-size: var(--t-title);\n  font-weight: var(--w-bold);\n  line-height: var(--lh-snug);\n  letter-spacing: -0.01em;\n  color: var(--fg-primary);\n}\n.embark-subtitle {\n  font-family: var(--font-headline);\n  font-size: var(--t-subtitle);\n  font-weight: var(--w-medium);\n  line-height: var(--lh-snug);\n  color: var(--fg-accent);\n}\n.embark-section {\n  font-family: var(--font-headline);\n  font-size: var(--t-section);\n  font-weight: var(--w-bold);\n  line-height: var(--lh-snug);\n  color: var(--fg-accent);\n}\n.embark-body {\n  font-family: var(--font-body);\n  font-size: var(--t-body);\n  font-weight: var(--w-regular);\n  line-height: var(--lh-body);\n  color: var(--fg-primary);\n}\n.embark-body-sm {\n  font-family: var(--font-body);\n  font-size: var(--t-body-sm);\n  font-weight: var(--w-regular);\n  line-height: var(--lh-body);\n  color: var(--fg-secondary);\n}\n.embark-caption {\n  font-family: var(--font-body);\n  font-size: var(--t-caption);\n  font-weight: var(--w-regular);\n  line-height: var(--lh-snug);\n  color: var(--fg-secondary);\n}\n.embark-footnote {\n  font-family: var(--font-body);\n  font-size: var(--t-footnote);\n  font-weight: var(--w-regular);\n  color: var(--fg-secondary);\n}\n<\u002Fstyle>\n<style>\n  :root{ --font-headline:\"Embark Sans Headline\",\"Inter\",system-ui,sans-serif; --font-body:\"Embark Sans\",\"Inter\",system-ui,sans-serif; }\n  html,body{ margin:0; padding:0; background:#EEF1F5; }\n  *{ box-sizing:border-box; }\n  body{ font-family:var(--font-body); color:#0c1116; -webkit-font-smoothing:antialiased; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh; background:#EEF1F5;\">\n  <main style=\"max-width:1240px; margin:0 auto; padding:46px 28px 72px;\">\n\n    <section style=\"margin-bottom:30px;\">\n      <div style=\"display:flex; align-items:flex-start; justify-content:space-between; gap:24px; flex-wrap:wrap;\">\n        <div style=\"max-width:780px;\">\n          <div style=\"font-family:var(--font-headline); font-weight:700; font-size:13px; color:#237EF1; letter-spacing:.04em; text-transform:uppercase;\">User access review · Workflow overview<\u002Fdiv>\n          <h1 style=\"margin:10px 0 0; font-family:var(--font-headline); font-weight:700; font-size:38px; line-height:1.1; letter-spacing:-0.015em; color:#0c1116;\">The review, end to end<\u002Fh1>\n          <p style=\"margin:14px 0 0; font-size:16.5px; line-height:1.55; color:#44546A;\">The same eleven stages as the full build, laid out as a single flow. It begins automatically on a set cadence and ends as a locked audit record. Each box names what happens; open the full build for the mechanism and assets behind each one.<\u002Fp>\n        <\u002Fdiv>\n        <a href=\"UAR Build Spec.html\" style=\"flex-shrink:0; text-decoration:none; font-family:var(--font-body); font-size:13px; font-weight:700; color:#237EF1; background:#fff; border:1px solid #BFD7FB; border-radius:6px; padding:11px 16px; white-space:nowrap;\">Full build detail →<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"background:#fff; border:1px solid #D7DCE3; border-radius:12px; padding:24px 22px; box-shadow:0 1px 2px rgba(12,17,22,.04);\">\n\n      <div style=\"display:flex; align-items:stretch; gap:0; flex-wrap:wrap;\">\n\n        <!-- PHASE 1 -->\n        <div style=\"flex:1 1 230px; min-width:222px; display:flex; flex-direction:column;\">\n          <div style=\"margin-bottom:12px;\">\n            <div style=\"font-family:var(--font-headline); font-weight:700; font-size:15px; color:#0c1116;\">Collect the data<\u002Fdiv>\n            <div style=\"font-size:11.5px; font-weight:700; color:#9aa3ad; letter-spacing:.04em; margin-top:2px;\">STAGES 01–03<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:10px;\">\n            <div style=\"background:#fff; border:1px solid #D7DCE3; border-radius:8px; padding:12px 13px;\"><div style=\"display:flex; align-items:center; gap:9px;\"><span style=\"flex-shrink:0; width:26px; height:26px; border-radius:50%; background:#EAF3FE; color:#237EF1; font-family:var(--font-headline); font-weight:700; font-size:12px; display:flex; align-items:center; justify-content:center;\">01<\u002Fspan><span style=\"font-family:var(--font-headline); font-weight:700; font-size:17px; color:#0c1116;\">Cycle trigger<\u002Fspan><\u002Fdiv><div style=\"font-size:11px; line-height:1.45; color:#7a8593; margin-top:6px;\">A new review cycle opens automatically on its set cadence.<\u002Fdiv><\u002Fdiv>\n            <div style=\"align-self:center; color:#C2CAD4; line-height:0;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"6 9 12 15 18 9\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n            <div style=\"background:#fff; border:1px solid #D7DCE3; border-radius:8px; padding:12px 13px;\"><div style=\"display:flex; align-items:center; gap:9px;\"><span style=\"flex-shrink:0; width:26px; height:26px; border-radius:50%; background:#EAF3FE; color:#237EF1; font-family:var(--font-headline); font-weight:700; font-size:12px; display:flex; align-items:center; justify-content:center;\">02<\u002Fspan><span style=\"font-family:var(--font-headline); font-weight:700; font-size:17px; color:#0c1116;\">Data ingestion<\u002Fspan><\u002Fdiv><div style=\"font-size:11px; line-height:1.45; color:#7a8593; margin-top:6px;\">Each system's access feed lands in one shared staging table.<\u002Fdiv><\u002Fdiv>\n            <div style=\"align-self:center; color:#C2CAD4; line-height:0;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"6 9 12 15 18 9\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n            <div style=\"background:#fff; border:1px solid #D7DCE3; border-radius:8px; padding:12px 13px;\"><div style=\"display:flex; align-items:center; gap:9px;\"><span style=\"flex-shrink:0; width:26px; height:26px; border-radius:50%; background:#EAF3FE; color:#237EF1; font-family:var(--font-headline); font-weight:700; font-size:12px; display:flex; align-items:center; justify-content:center;\">03<\u002Fspan><span style=\"font-family:var(--font-headline); font-weight:700; font-size:17px; color:#0c1116;\">HR &amp; role merge<\u002Fspan><span style=\"font-size:9.5px; font-weight:700; color:#fff; background:#94a0ad; padding:2px 6px; border-radius:3px;\">OPTIONAL<\u002Fspan><\u002Fdiv><div style=\"font-size:11px; line-height:1.45; color:#7a8593; margin-top:6px;\">Feeds join into one population row per user. Runs where HR-to-account linkage exists.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"flex:0 0 40px; display:flex; align-items:center; justify-content:center; color:#C2CAD4;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"9 6 15 12 9 18\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n\n        <!-- PHASE 2 -->\n        <div style=\"flex:1 1 230px; min-width:222px; display:flex; flex-direction:column;\">\n          <div style=\"margin-bottom:12px;\">\n            <div style=\"font-family:var(--font-headline); font-weight:700; font-size:15px; color:#0c1116;\">Set up the review<\u002Fdiv>\n            <div style=\"font-size:11.5px; font-weight:700; color:#9aa3ad; letter-spacing:.04em; margin-top:2px;\">STAGES 04–05<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:10px;\">\n            <div style=\"background:#fff; border:1px solid #D7DCE3; border-radius:8px; padding:12px 13px;\"><div style=\"display:flex; align-items:center; gap:9px;\"><span style=\"flex-shrink:0; width:26px; height:26px; border-radius:50%; background:#EAF3FE; color:#237EF1; font-family:var(--font-headline); font-weight:700; font-size:12px; display:flex; align-items:center; justify-content:center;\">04<\u002Fspan><span style=\"font-family:var(--font-headline); font-weight:700; font-size:17px; color:#0c1116;\">Role &amp; reviewer mapping<\u002Fspan><\u002Fdiv><div style=\"font-size:11px; line-height:1.45; color:#7a8593; margin-top:6px;\">Each row is matched to its role definition and the reviewer responsible for it.<\u002Fdiv><\u002Fdiv>\n            <div style=\"align-self:center; color:#C2CAD4; line-height:0;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"6 9 12 15 18 9\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n            <div style=\"background:#F4F8FE; border:1.5px solid #9CC4F7; border-radius:8px; padding:12px 13px;\"><div style=\"display:flex; align-items:center; gap:9px;\"><span style=\"flex-shrink:0; width:26px; height:26px; border-radius:7px; background:#237EF1; color:#fff; display:flex; align-items:center; justify-content:center;\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M9 11l3 3L22 4\"><\u002Fpath><path d=\"M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11\"><\u002Fpath><\u002Fsvg><\u002Fspan><span style=\"font-family:var(--font-headline); font-weight:700; font-size:17px; color:#0c1116;\">Coordinator confirms<\u002Fspan><span style=\"font-size:9.5px; font-weight:700; color:#fff; background:#237EF1; padding:2px 6px; border-radius:3px;\">GATE<\u002Fspan><\u002Fdiv><div style=\"font-size:11px; line-height:1.45; color:#44546A; margin-top:6px;\">The review coordinator checks that the reviewer assignments are appropriate and confirms them. Sheets are only generated once this sign-off is given.<\u002Fdiv><\u002Fdiv>\n            <div style=\"align-self:center; color:#C2CAD4; line-height:0;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"6 9 12 15 18 9\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n            <div style=\"background:#fff; border:1px solid #D7DCE3; border-radius:8px; padding:12px 13px;\"><div style=\"display:flex; align-items:center; gap:9px;\"><span style=\"flex-shrink:0; width:26px; height:26px; border-radius:50%; background:#EAF3FE; color:#237EF1; font-family:var(--font-headline); font-weight:700; font-size:12px; display:flex; align-items:center; justify-content:center;\">05<\u002Fspan><span style=\"font-family:var(--font-headline); font-weight:700; font-size:17px; color:#0c1116;\">Reviewer sheets built<\u002Fspan><\u002Fdiv><div style=\"font-size:11px; line-height:1.45; color:#7a8593; margin-top:6px;\">One sheet per reviewer is generated and routed, scoped to only their rows. A reconciliation confirms no row is lost in the split.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"flex:0 0 40px; display:flex; align-items:center; justify-content:center; color:#C2CAD4;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"9 6 15 12 9 18\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n\n        <!-- PHASE 3 -->\n        <div style=\"flex:1 1 230px; min-width:222px; display:flex; flex-direction:column;\">\n          <div style=\"margin-bottom:12px;\">\n            <div style=\"font-family:var(--font-headline); font-weight:700; font-size:15px; color:#0c1116;\">Review &amp; resolve<\u002Fdiv>\n            <div style=\"font-size:11.5px; font-weight:700; color:#9aa3ad; letter-spacing:.04em; margin-top:2px;\">STAGES 06–08<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:10px;\">\n            <div style=\"background:#fff; border:1px solid #D7DCE3; border-radius:8px; padding:12px 13px;\"><div style=\"display:flex; align-items:center; gap:9px;\"><span style=\"flex-shrink:0; width:26px; height:26px; border-radius:50%; background:#EAF3FE; color:#237EF1; font-family:var(--font-headline); font-weight:700; font-size:12px; display:flex; align-items:center; justify-content:center;\">06<\u002Fspan><span style=\"font-family:var(--font-headline); font-weight:700; font-size:17px; color:#0c1116;\">Line certification<\u002Fspan><\u002Fdiv><div style=\"font-size:11px; line-height:1.45; color:#7a8593; margin-top:6px;\">Reviewers mark each line Approve, Revoke, or Escalate, with a reason.<\u002Fdiv><\u002Fdiv>\n            <div style=\"align-self:center; color:#C2CAD4; line-height:0;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"6 9 12 15 18 9\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n            <div style=\"background:#fff; border:1px solid #D7DCE3; border-radius:8px; padding:12px 13px;\"><div style=\"display:flex; align-items:center; gap:9px;\"><span style=\"flex-shrink:0; width:26px; height:26px; border-radius:50%; background:#EAF3FE; color:#237EF1; font-family:var(--font-headline); font-weight:700; font-size:12px; display:flex; align-items:center; justify-content:center;\">07<\u002Fspan><span style=\"font-family:var(--font-headline); font-weight:700; font-size:17px; color:#0c1116;\">Completeness lock<\u002Fspan><\u002Fdiv><div style=\"font-size:11px; line-height:1.45; color:#7a8593; margin-top:6px;\">A sheet cannot be submitted while any line is still undecided.<\u002Fdiv><\u002Fdiv>\n            <div style=\"align-self:center; color:#C2CAD4; line-height:0;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"6 9 12 15 18 9\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n            <div style=\"background:#fff; border:1px solid #D7DCE3; border-radius:8px; padding:12px 13px;\"><div style=\"display:flex; align-items:center; gap:9px;\"><span style=\"flex-shrink:0; width:26px; height:26px; border-radius:50%; background:#EAF3FE; color:#237EF1; font-family:var(--font-headline); font-weight:700; font-size:12px; display:flex; align-items:center; justify-content:center;\">08<\u002Fspan><span style=\"font-family:var(--font-headline); font-weight:700; font-size:17px; color:#0c1116;\">Coordinator roll-up<\u002Fspan><\u002Fdiv><div style=\"font-size:11px; line-height:1.45; color:#7a8593; margin-top:6px;\">Submitted sheets aggregate; the coordinator triages and closes escalations.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"flex:0 0 40px; display:flex; align-items:center; justify-content:center; color:#C2CAD4;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"9 6 15 12 9 18\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n\n        <!-- PHASE 4 -->\n        <div style=\"flex:1 1 230px; min-width:222px; display:flex; flex-direction:column;\">\n          <div style=\"margin-bottom:12px;\">\n            <div style=\"font-family:var(--font-headline); font-weight:700; font-size:15px; color:#0c1116;\">Certify &amp; close<\u002Fdiv>\n            <div style=\"font-size:11.5px; font-weight:700; color:#9aa3ad; letter-spacing:.04em; margin-top:2px;\">STAGES 09–11<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:10px;\">\n            <div style=\"background:#fff; border:1px solid #D7DCE3; border-radius:8px; padding:12px 13px;\"><div style=\"display:flex; align-items:center; gap:9px;\"><span style=\"flex-shrink:0; width:26px; height:26px; border-radius:50%; background:#EAF3FE; color:#237EF1; font-family:var(--font-headline); font-weight:700; font-size:12px; display:flex; align-items:center; justify-content:center;\">09<\u002Fspan><span style=\"font-family:var(--font-headline); font-weight:700; font-size:17px; color:#0c1116;\">System certification<\u002Fspan><\u002Fdiv><div style=\"font-size:11px; line-height:1.45; color:#7a8593; margin-top:6px;\">The system owner reviews the consolidated per-user report and applies a binding sign-off.<\u002Fdiv><\u002Fdiv>\n            <div style=\"align-self:center; color:#C2CAD4; line-height:0;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"6 9 12 15 18 9\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n            <div style=\"background:#fff; border:1px solid #D7DCE3; border-radius:8px; padding:12px 13px;\"><div style=\"display:flex; align-items:center; gap:9px;\"><span style=\"flex-shrink:0; width:26px; height:26px; border-radius:50%; background:#EAF3FE; color:#237EF1; font-family:var(--font-headline); font-weight:700; font-size:12px; display:flex; align-items:center; justify-content:center;\">10<\u002Fspan><span style=\"font-family:var(--font-headline); font-weight:700; font-size:17px; color:#0c1116;\">Remediation<\u002Fspan><\u002Fdiv><div style=\"font-size:11px; line-height:1.45; color:#7a8593; margin-top:6px;\">Revocations are carried out in the source systems and proof of removal is recorded.<\u002Fdiv><\u002Fdiv>\n            <div style=\"align-self:center; color:#C2CAD4; line-height:0;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"6 9 12 15 18 9\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n            <div style=\"background:#F3FAF5; border:1px solid #BCE3C8; border-radius:8px; padding:12px 13px;\"><div style=\"display:flex; align-items:center; gap:9px;\"><span style=\"flex-shrink:0; width:26px; height:26px; border-radius:50%; background:#E1F2E6; color:#1f8a3c; font-family:var(--font-headline); font-weight:700; font-size:12px; display:flex; align-items:center; justify-content:center;\">11<\u002Fspan><span style=\"font-family:var(--font-headline); font-weight:700; font-size:17px; color:#0c1116;\">Audit lock<\u002Fspan><\u002Fdiv><div style=\"font-size:11px; line-height:1.45; color:#7a8593; margin-top:6px;\">The cycle freezes into locked, exportable evidence: snapshot, decisions, sign-off, and removals.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n\n      <div style=\"margin-top:22px; padding-top:18px; border-top:1px solid #EEF1F4; display:flex; align-items:center; gap:24px; flex-wrap:wrap; font-size:12.5px; color:#44546A;\">\n        <span style=\"display:inline-flex; align-items:center; gap:8px;\"><span style=\"width:8px; height:8px; border-radius:50%; background:#237EF1; flex-shrink:0;\"><\u002Fspan><span><span style=\"font-weight:700; color:#0c1116;\">Start<\u002Fspan> — opens automatically on the configured cadence.<\u002Fspan><\u002Fspan>\n        <span style=\"display:inline-flex; align-items:center; gap:8px;\"><span style=\"width:8px; height:8px; border-radius:50%; background:#1f8a3c; flex-shrink:0;\"><\u002Fspan><span><span style=\"font-weight:700; color:#0c1116;\">End<\u002Fspan> — a locked, exportable audit record of who has access to what, and why.<\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n\n    <\u002Fsection>\n\n    <footer style=\"border-top:1px solid #D7DCE3; padding-top:24px; margin-top:40px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;\">\n      <span style=\"font-size:12.5px; color:#44546A;\"><span style=\"font-weight:700; color:#0c1116;\">embark<\u002Fspan>withus.com<\u002Fspan>\n      <a href=\"UAR Build Spec.html\" style=\"text-decoration:none; font-size:12.5px; color:#237EF1; font-weight:700;\">Full build detail, stage by stage →<\u002Fa>\n    <\u002Ffooter>\n\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1240,&quot;height&quot;:680}}\"><\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
